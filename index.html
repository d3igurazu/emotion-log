<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --primary-color: #1a202c; --bg-color: #f7fafc; --card-bg: #ffffff; }
    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); margin: 0; display: flex; justify-content: center; padding: 20px; }
    .app-container { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 400px 1fr; gap: 24px; }
    
    .card { background: var(--card-bg); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #edf2f7; }
    h3 { margin-top: 0; color: #4a5568; font-size: 1.1rem; border-bottom: 1px solid #edf2f7; padding-bottom: 10px; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.85rem; color: #718096; margin-bottom: 8px; }
    
    .input-row { display: flex; gap: 8px; }
    .input-num { width: 85px !important; text-align: center; }
    .input-text { flex: 1; }
    
    input { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 0.95rem; }
    
    .tag-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { background: #edf2f7; color: #4a5568; padding: 4px 10px; border-radius: 6px; font-size: 0.72rem; cursor: pointer; transition: 0.2s; }
    .tag:hover { background: #e2e8f0; }
    
    #map-container { background: white; border-radius: 12px; position: relative; width: 100%; aspect-ratio: 1/1; border: 1px solid #e2e8f0; }
    #emotion-canvas { width: 100%; height: 100%; }

    .btn-save { background: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-save:hover { opacity: 0.9; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="card">
    <h3>新しい記録</h3>
    <div class="form-group">
      <label>日付</label>
      <input type="date" id="date" style="width: 100%;">
    </div>
    
    <div class="form-group">
      <label>気持ち (X軸: -100 ～ +100 / キーワード)</label>
      <div class="input-row">
        <input type="number" id="xValue" class="input-num" value="0" min="-100" max="100">
        <input type="text" id="xKeyword" class="input-text" placeholder="キーワード入力">
      </div>
      <div class="tag-container">
        <span class="tag" onclick="setVal('x', 44, '落ち着いてきた')">落ち着いてきた</span>
        <span class="tag" onclick="setVal('x', -28, '不安、怖い')">不安、怖い</span>
      </div>
    </div>

    <div class="form-group">
      <label>身体エネルギー (Y軸: -100 ～ +100 / キーワード)</label>
      <div class="input-row">
        <input type="number" id="yValue" class="input-num" value="0" min="-100" max="100">
        <input type="text" id="yKeyword" class="input-text" placeholder="キーワード入力">
      </div>
      <div class="tag-container">
        <span class="tag" onclick="setVal('y', 36, '穏やか')">穏やか</span>
        <span class="tag" onclick="setVal('y', -11, '寝不足気味')">寝不足気味</span>
      </div>
    </div>

    <div class="form-group">
      <label>コメント</label>
      <input type="text" id="comment" placeholder="詳細を記入..." style="width: 100%;">
    </div>
    <button class="btn-save" onclick="saveData()">＋ 記録する</button>
  </div>

  <div class="card">
    <h3>状態マップ</h3>
    <div id="map-container">
      <canvas id="emotion-canvas"></canvas>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('emotion-canvas');
  const ctx = canvas.getContext('2d');
  
  // GAS側から動的にメールアドレスを受け取る設定
  let userEmail = "<?= userEmail ?>"; 

  function init() {
    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    resizeCanvas();
    loadAndDraw();
  }

  function resizeCanvas() {
    const size = canvas.parentElement.clientWidth;
    canvas.width = size;
    canvas.height = size;
    loadAndDraw();
  }

  function drawMap(points = []) {
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = '#1a202c';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h); ctx.stroke();

    ctx.strokeStyle = '#edf2f7';
    ctx.lineWidth = 1;
    ctx.strokeRect(w*0.1, h*0.1, w*0.8, h*0.8);

    points.forEach(p => {
      const xVal = parseFloat(p.xValue);
      const yVal = parseFloat(p.yValue);
      if (!isNaN(xVal) && !isNaN(yVal)) {
        const x = (xVal + 100) * (w / 200);
        const y = (100 - yVal) * (h / 200);
        ctx.fillStyle = '#f56565';
        ctx.beginPath(); ctx.arc(x, y, 6, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = 'white'; ctx.lineWidth = 2; ctx.stroke();
      }
    });
  }

  function setVal(axis, val, kw) {
    document.getElementById(axis + 'Value').value = val;
    document.getElementById(axis + 'Keyword').value = kw;
  }

  function saveData() {
    const data = {
      action: 'addEntry',
      email: userEmail,
      date: document.getElementById('date').value,
      time: new Date().toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'}),
      xValue: document.getElementById('xValue').value,
      xKeyword: document.getElementById('xKeyword').value,
      yValue: document.getElementById('yValue').value,
      yKeyword: document.getElementById('yKeyword').value,
      comment: document.getElementById('comment').value
    };

    google.script.run.withSuccessHandler(() => {
      document.getElementById('xValue').value = 0;
      document.getElementById('xKeyword').value = "";
      document.getElementById('yValue').value = 0;
      document.getElementById('yKeyword').value = "";
      document.getElementById('comment').value = "";
      loadAndDraw(); 
    }).doPostProxy(data);
  }

  function loadAndDraw() {
    google.script.run.withSuccessHandler(res => {
      if(res && res.success) drawMap(res.entries || []);
    }).doPostProxy({ action: 'getEntries', email: userEmail });
  }

  window.onload = init;
  window.onresize = resizeCanvas;
</script>
</body>
</html>
